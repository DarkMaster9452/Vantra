name: Build Android TV APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'URL nasadenej Vantry (napr. https://vantra.vercel.app)'
        required: true
        default: 'https://vantra.vercel.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APK
        run: gradle -p android-tv assembleDebug -PvantraUrl="${{ github.event.inputs.app_url }}"

      - uses: actions/upload-artifact@v4
        with:
          name: vantra-tv-apk
          path: android-tv/app/build/outputs/apk/debug/app-debug.apk
